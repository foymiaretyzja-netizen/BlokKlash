<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blok Klash</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Bungee&display=swap" rel="stylesheet">
    
    <style>
        /* Fullscreen Reset */
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            overflow: hidden; /* Prevents scrollbars from appearing */
            font-family: 'Bungee', sans-serif; /* Blocky font applied globally */
            user-select: none;
        }

        /* Canvas stretched to fill the exact window size */
        #gameCanvas {
            display: block;
            background-color: #111; /* Darker void to replace the arcade box */
            cursor: pointer;
        }

        /* Float the logo perfectly over the canvas */
        #gameLogo {
            position: absolute;
            top: 10%;
            max-width: 500px; /* Adjust this if your logo is too big/small */
            width: 80%;
            display: none; /* Hidden by default, JS controls this */
            pointer-events: none; /* Lets you click the canvas 'through' the image */
            /* Applies the light red and light blue blocky aesthetic */
            filter: drop-shadow(4px 4px 0px #ff7675) drop-shadow(-4px -4px 0px #74b9ff);
            z-index: 10;
        }

        /* Adjusted to float over the new fullscreen layout */
        .debug-hint {
            position: absolute;
            bottom: 10px;
            left: 10px;
            color: #666;
            font-size: 12px;
            pointer-events: none;
            z-index: 10;
        }
    </style>
</head>
<body>

    <img id="gameLogo" src="assets/logo.png" alt="Blok Klash Logo">

    <canvas id="gameCanvas"></canvas>
    <div class="debug-hint">Tip: Hitboxes are active! To see them, uncomment AttackSystem.drawDebug(ctx) in the script.</div>

    <script src="sys/maps/sewers.js"></script>
    <script src="sys/control.js"></script>
    <script src="sys/background.js"></script>
    <script src="sys/player.js"></script>
    <script src="sys/player2.js"></script>
    <script src="sys/attack.js"></script>
    <script src="sys/combo.js"></script>
    <script src="sys/damage.js"></script>
    <script src="sys/effect.js"></script>
    <script src="sys/titlescreen.js"></script>

    <script>
        window.onload = () => {
            const canvas = document.getElementById('gameCanvas');
            const ctx = canvas.getContext('2d');
            const logoElement = document.getElementById('gameLogo');

            // --- FULLSCREEN CANVAS RESIZER ---
            function resizeCanvas() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
            window.addEventListener('resize', resizeCanvas);
            resizeCanvas(); // Trigger immediately to set initial size

            console.log("Blok Klash Engine: Initializing Subsystems...");
            
            TitleScreen.init(canvas);
            AttackSystem.init();
            ComboSystem.init();
            DamageSystem.init();
            EffectSystem.init();
            
            Player1.init();
            Player2.init();

            console.log("Blok Klash Engine: All Core Systems Online!");

            function gameLoop() {
                // Toggle the HTML Logo ON during the title screen, and OFF everywhere else
                if (TitleScreen.currentScreen === 'TITLE') {
                    logoElement.style.display = 'block';
                } else {
                    logoElement.style.display = 'none';
                }

                if (TitleScreen.currentScreen === 'PLAYING') {
                    
                    Player1.update();
                    Player2.update();
                    AttackSystem.update();
                    ComboSystem.update();
                    DamageSystem.update(); 
                    EffectSystem.update(); 

                    if (Player1.health <= 0) {
                        TitleScreen.triggerGameOver('p2'); 
                    } else if (Player2.health <= 0) {
                        TitleScreen.triggerGameOver('p1'); 
                    }

                    ctx.clearRect(0, 0, canvas.width, canvas.height);

                    EffectSystem.applyShake(ctx);

                    if (typeof MapSewers !== 'undefined') {
                        MapSewers.draw(ctx, canvas.width, canvas.height);
                    }

                    Player1.draw(ctx);
                    Player2.draw(ctx);
                    EffectSystem.draw(ctx);
                    EffectSystem.clearShake(ctx);
                    TitleScreen.drawCombatHUD(ctx, canvas.width);

                } else {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    TitleScreen.draw(ctx, canvas.width, canvas.height);
                }

                requestAnimationFrame(gameLoop);
            }

            requestAnimationFrame(gameLoop); 
        };
    </script>

</body>
</html>
