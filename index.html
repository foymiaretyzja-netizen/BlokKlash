<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Blok Klash - Menu</title>
    <link href="https://fonts.googleapis.com/css2?family=Bungee&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #111;
            color: white;
            font-family: 'Bungee', sans-serif;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        img {
            max-width: 400px;
            filter: drop-shadow(4px 4px 0px #ff7675) drop-shadow(-4px -4px 0px #74b9ff);
            margin-bottom: 40px;
        }
        button {
            background-color: #222;
            color: white;
            border: 2px solid #555;
            padding: 15px 30px;
            font-family: 'Bungee', sans-serif;
            font-size: 18px;
            margin: 10px;
            cursor: pointer;
            transition: 0.2s;
        }
        button:hover {
            background-color: #444;
            border-color: white;
        }
        .start-btn {
            background-color: #ff3b30;
            border-color: #ff7675;
            font-size: 24px;
            margin-top: 30px;
        }
    </style>
</head>
<body>

    <img src="assets/logo.png" alt="Blok Klash Logo">

    <div>
        <h3>Player 1 Controls</h3>
        <button onclick="setControl('p1', 'wasd')">Use WASD</button>
        <button onclick="setControl('p1', 'esdf')">Use ESDF</button>
        <p id="p1-status" style="color: #ff7675;">Current: WASD</p>
    </div>

    <div>
        <h3>Player 2 Controls</h3>
        <button onclick="setControl('p2', 'pl;')">Use PL;'</button>
        <button onclick="setControl('p2', 'ijkl')">Use IJKL</button>
        <p id="p2-status" style="color: #74b9ff;">Current: PL;'</p>
    </div>

    <button class="start-btn" onclick="window.location.href='game.html'">START BATTLE</button>

    <script>
        // Load existing settings if they visited before
        document.getElementById('p1-status').innerText = "Current: " + (localStorage.getItem('p1Layout') || 'wasd').toUpperCase();
        document.getElementById('p2-status').innerText = "Current: " + (localStorage.getItem('p2Layout') || 'pl;').toUpperCase();

        function setControl(player, layout) {
            // Save to browser memory
            localStorage.setItem(player + 'Layout', layout);
            // Update the text on screen
            document.getElementById(player + '-status').innerText = "Current: " + layout.toUpperCase();
        }
    </script>
</body>
</html>
